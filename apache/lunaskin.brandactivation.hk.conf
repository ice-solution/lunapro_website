<VirtualHost *:80>
    ServerName lunaskin.brandactivation.hk
    ServerAlias www.lunaskin.brandactivation.hk
    
    # 重定向到 HTTPS（Cloudflare Flexible SSL）
    RewriteEngine On
    RewriteCond %{HTTP:CF-Visitor} '"scheme":"http"'
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
    
    # 如果沒有 Cloudflare，也可以使用這個
    # RewriteCond %{HTTPS} off
    # RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName lunaskin.brandactivation.hk
    ServerAlias www.lunaskin.brandactivation.hk
    
    # SSL 配置（Cloudflare Flexible SSL - 使用自簽名證書或 Cloudflare Origin Certificate）
    SSLEngine on
    # 如果使用 Cloudflare Origin Certificate，請指定證書路徑
    # SSLCertificateFile /path/to/origin.crt
    # SSLCertificateKeyFile /path/to/origin.key
    # 如果使用自簽名證書（僅用於 Cloudflare Flexible SSL）
    # SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
    # SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key
    
    # 文檔根目錄（Vite 構建後的 dist 目錄）
    DocumentRoot /var/www/lunapro_website/dist
    
    <Directory /var/www/lunapro_website/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # React Router / SPA 路由支持
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>
    
    # 靜態資源緩存
    <DirectoryMatch "\.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff|woff2|ttf|eot)$">
        ExpiresActive On
        ExpiresDefault "access plus 1 year"
        Header set Cache-Control "public, immutable"
    </DirectoryMatch>
    
    # 日誌文件
    ErrorLog ${APACHE_LOG_DIR}/lunaskin.brandactivation.hk_error.log
    CustomLog ${APACHE_LOG_DIR}/lunaskin.brandactivation.hk_access.log combined
    
    # 安全標頭（Cloudflare 會處理一些，但可以添加額外的）
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    
    # Cloudflare 真實 IP（如果使用 Cloudflare）
    # 需要安裝 mod_cloudflare 或使用 mod_remoteip
    # RemoteIPHeader CF-Connecting-IP
    # RemoteIPTrustedProxy 173.245.48.0/20
    # RemoteIPTrustedProxy 103.21.244.0/22
    # RemoteIPTrustedProxy 103.22.200.0/22
    # RemoteIPTrustedProxy 103.31.4.0/22
    # RemoteIPTrustedProxy 141.101.64.0/18
    # RemoteIPTrustedProxy 108.162.192.0/18
    # RemoteIPTrustedProxy 190.93.240.0/20
    # RemoteIPTrustedProxy 188.114.96.0/20
    # RemoteIPTrustedProxy 197.234.240.0/22
    # RemoteIPTrustedProxy 198.41.128.0/17
    # RemoteIPTrustedProxy 162.158.0.0/15
    # RemoteIPTrustedProxy 104.16.0.0/13
    # RemoteIPTrustedProxy 104.24.0.0/14
    # RemoteIPTrustedProxy 172.64.0.0/13
    # RemoteIPTrustedProxy 131.0.72.0/22
</VirtualHost>
